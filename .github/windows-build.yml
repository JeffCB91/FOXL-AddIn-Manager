name: Windows Build
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-exes:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build Admin executable
        run: |
          pyinstaller --onefile --windowed --name "foxl_addin_admin" main.py
      - name: Build User executable
        run: |
          pyinstaller --onefile --windowed --name "foxl_addin_user" main_user.py
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foxl-addin-manager-dist
          path: dist/